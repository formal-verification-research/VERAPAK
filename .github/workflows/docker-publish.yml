name: Docker Publish

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      targetArch:
        description: "Target architecture"
        type: string
        required: true
        default: "x86_64"
      targetOS:
        description: "Target operating system (VENDOR-OS)"
        type: string
        required: false
      

env:
  IMAGE_NAME: yodarocks1/verapak
  TARGET_ARCH: ${{ inputs.targetArch || 'x86_64' }}
  TARGET_OS: ${{ inputs.targetOS || 'unknown-unknown' }}


jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write
    environment: DockerHub

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 #v3.5.0
        with:
          cosign-release: 'v2.2.4'

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Creates the string representation of the current architecture
      # Outputs: str, is_default
      - name: Get architecture tag
        id: arch
        run: |
          echo "str=${{ env.TARGET_ARCH }}$(if [ '${{ env.TARGET_OS }}' != 'unknown-unknown' ]; then echo '-${{ env.TARGET_OS }}'; fi)"
          echo "is_default=$([ '${{ env.TARGET_ARCH }}' == 'x86_64' ] && [ '${{ env.TARGET_OS }}' == 'unknown-unknown' ])"

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=schedule,suffix=-${{ steps.arch.outputs.str }}
            type=semver,pattern={{version}},suffix=+${{ steps.arch.outputs.str }}
            type=semver,pattern={{major}}.{{minor}},suffix=+${{ steps.arch.outputs.str }}
            type=semver,pattern={{major}},suffix=+${{ steps.arch.outputs.str }}
            type=ref,event=branch,suffix=-${{ steps.arch.outputs.str }}
            type=ref,event=pr,suffix=-${{ steps.arch.outputs.str }}
            type=raw,value=dev,suffix=-${{ steps.arch.outputs.str }}
            type=schedule,enable=${{ steps.arch.outputs.is_default }}
            type=semver,pattern={{version}},enable=${{ steps.arch.outputs.is_default }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.arch.outputs.is_default }}
            type=semver,pattern={{major}},enable=${{ steps.arch.outputs.is_default }}
            type=ref,event=branch,enable=${{ steps.arch.outputs.is_default }}
            type=ref,event=pr,enable=${{ steps.arch.outputs.is_default }}
            type=raw,value=dev,enable=${{ steps.arch.outputs.is_default }}
            

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            TARGET_ARCH=${{ env.TARGET_ARCH }}
            TARGET_OS=${{ env.TARGET_OS }}

      # Sign the resulting Docker image digest except on PRs.
      # This will only write to the public Rekor transparency log when the Docker
      # repository is public to avoid leaking data.  If you would like to publish
      # transparency data even for private images, pass --force to cosign below.
      # https://github.com/sigstore/cosign
      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        # This step uses the identity token to provision an ephemeral certificate
        # against the sigstore community Fulcio instance.
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
